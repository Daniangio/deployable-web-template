name: web-game-template-dev

services:
  redis:
    image: redis:7-alpine
    command: >
      sh -c "if [ -n \"$$REDIS_PASSWORD\" ]; then
               exec redis-server --requirepass \"$$REDIS_PASSWORD\";
             else
               exec redis-server;
             fi"
    volumes:
      - redis_data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "if [ -n \"$$REDIS_PASSWORD\" ]; then redis-cli -a \"$$REDIS_PASSWORD\" ping; else redis-cli ping; fi",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: "${REDIS_PASSWORD:-}"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-game_template}"
      POSTGRES_USER: "${POSTGRES_USER:-game_template}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-game_template_dev_password}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-game_template} -d ${POSTGRES_DB:-game_template}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: >
      sh -c "pip install -r backend/requirements.txt &&
             uvicorn backend.app.main:app --reload --workers 1 --host 0.0.0.0 --port 8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    volumes:
      - .:/workspace
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      DATABASE_URL: "postgresql+psycopg://${POSTGRES_USER:-game_template}:${POSTGRES_PASSWORD:-game_template_dev_password}@postgres:5432/${POSTGRES_DB:-game_template}"
      REDIS_URL: "${REDIS_URL:-redis://redis:6379/0}"
      REDIS_PASSWORD: "${REDIS_PASSWORD:-}"
      FIREBASE_ADMIN_CREDENTIALS: "${FIREBASE_ADMIN_CREDENTIALS:-secrets/firebase-admin.dev.json}"
      AUTO_CREATE_SCHEMA: "true"
    working_dir: /workspace
    tty: true

  redisinsight:
    profiles: ["ops"]
    image: redis/redisinsight:latest
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:${REDIS_INSIGHT_PORT:-5540}:5540"
    environment:
      RI_APP_HOST: "0.0.0.0"
      RI_ACCEPT_TERMS_AND_CONDITIONS: "true"
      RI_REDIS_HOST: "redis"
      RI_REDIS_PORT: "6379"
      RI_REDIS_ALIAS: "web-game-template-local"
      RI_REDIS_USERNAME: "default"
      RI_REDIS_PASSWORD: "${REDIS_PASSWORD:-}"
      RI_ENCRYPTION_KEY: "${REDIS_INSIGHT_ENCRYPTION_KEY:-local-dev-only-change-me}"
    volumes:
      - redisinsight_data:/data
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    command: >
      sh -c "npm install &&
             npm run dev"
    depends_on:
      - backend
    env_file:
      - path: .env
        required: false
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_API_URL: "${VITE_API_URL:-http://localhost:${BACKEND_PORT:-8000}}"
      VITE_WS_URL: "${VITE_WS_URL:-ws://localhost:${BACKEND_PORT:-8000}}"
    working_dir: /app
    shm_size: 2gb
    tty: true

volumes:
  postgres_data:
  redis_data:
  redisinsight_data:
  frontend_node_modules:
